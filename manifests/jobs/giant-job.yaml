apiVersion: batch/v1
kind: Job
metadata:
  generateName: giant-job-
  labels:
    kueue.x-k8s.io/queue-name: user-queue
spec:
  parallelism: 1
  completions: 1
  template:
    spec:
      containers:
      - name: dummy-job
        image: gcr.io/k8s-staging-perf-tests/sleep:v0.1.0
        args: ["10s"]
        resources:
          requests:
            cpu: "2" # Requests 2 CPUs (Waitlist trigger!)
      restartPolicy: Never
